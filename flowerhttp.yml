apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: flower-route 
  namespace: suwetha-ns
spec:
  parentRefs:
    - name: suwetha-gateway
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /flower
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /
      backendRefs:
        - name: flower-deployment-svc
          port: 3001